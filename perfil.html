<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Perfil</title>
     <link rel="stylesheet" href="styles/perfil.css">
    <link rel="stylesheet" href="styles/dashboard.css">
     <link rel="icon" href="./assets/logo/logosite.png">
</head>

<body>
    <div class="menu">
        <img class="logo" src="assets/logo/logo-branca.png" alt="">

        <div class="item">
            <img class="icons" src="assets/img/icons/dashboard-icon.png" alt="">
            <a href="dashboard.html">Dashboard</a>
        </div>

        <div class="item">
            <img class="icons" src="assets/img/icons/perfil-icon.png" alt="">
            <a href="perfil.html" class="ativo">Perfil</a>
        </div>
         <div class="item">
            <img class="icons" src="assets/img/icons/ajuda-icon.png" alt="">
            <a href="usuarios.html">Usuários</a>
        </div>

        <div class="item">
            <img class="icons" src="assets/img/icons/ajuda-icon.png" alt="">
            <a href="ajuda.html">Ajuda</a>
        </div>

        <div class="item logout-container">
            <a href="home.html" class="logout">Sair</a>
        </div>
    </div>

    <div class="conteudo">

        <div class="topo">
            <span>ADMINISTRADOR</span>

        </div>

        <h1>PERFIL</h1>

        <div class="container-perfil">

            <div class="foto-sessao">
                <img src="assets/logo/logosite.png" alt="Foto de Perfil" class="foto-usuario">
                <span class="link-mudar-foto">Mudar foto</span> 
                </div>

            <form class="form-perfil">
                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Nome">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="nome@email.com">
                </div>

                <div class="campo">
                    <label>Nome da Estufa</label>
                    <input type="text" placeholder="Ex: Estufa Principal">
                </div>

                <div class="campo-senha-container">
                    <div class="campo">
                        <label>Senha</label>
                        <div class="input-com-icone">
                            <input type="password" placeholder="Mínimo 8 caracteres">
                            <img src="olho.png" class="icone-olho">
                        </div>
                    </div>
                    <span class="link-mudar-senha">Mudar senha</span>
                </div>

                <div class="campo">
                    <label>Confirmar Senha</label>
                    <div class="input-com-icone">
                        <input type="password" placeholder="Repita a senha">
                        <img src="assets/img/icons/seguranca-icon.png" class="icone-olho" alt="Ver senha">
                    </div>
                </div>

                <button type="submit" class="btn-salvar">Salvar alterações</button>
            </form>
        </div>

    </div>

</body>

</html>
