<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Cadastrar Usuario</title>
    <link rel="stylesheet" href="../styles/dashboard/cadastroUsuario.css">
    <link rel="stylesheet" href="../styles/dashboard/dashboard.css">
    <link rel="icon" href="../assets/logo/logosite.png">
</head>

<body onload="carregarEstufas()">
    <div class="menu">
        <img class="logo" src="../assets/logo/logo-branca.png" alt="Greenlight">
        <div class="item">
            <img class="icons" src="../assets/img/icons/dashboard-icon.png" alt="">
            <a href="dashboard.html">Dashboard</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/perfil-icon.png" alt="">
            <a href="perfil.html">Perfil</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/icon-registro.png" alt="">
            <a href="registros.html">Registros</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/multiple-users-silhouette.png" alt="">
            <a href="usuarios.html" class="ativo">Usuários</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/ajuda-icon.png" alt="">
            <a href="ajuda.html">Ajuda</a>
        </div>

        <div class="item logout-container">
            <a href="../index.html" class="logout">Sair</a>
        </div>
    </div>

    <div class="conteudo">
        <div class="topo">
            <span>ADMINISTRADOR</span>
        </div>
        <h1>CADASTRAR <br>USUÁRIO</h1>

        <div class="container-perfil">

            <div class="campo">
                <label>Nome Completo</label>
                <input type="text" id="ipt_nome" placeholder="Nome">
            </div>

            <div class="campo">
                <label>Selecione a estufa designada para o usuário</label>
                <select id="select_estufa">
                    <option value="">Selecione uma estufa</option>
                </select>
            </div>

            <div class="campo">
                <label>Cargo e nível de acesso ao sistema</label>
                <select class="" id="select_cargo">
                    <option value="" selected disabled>Selecione o nível de acesso do usuário</option>
                    <option value="0">Administrador (Total)</option>
                    <option value="1">Gerente (Geral)</option>
                    <option value="2">Supervisor (Parcial)</option>
                    <option value="3">Operador (Nenhum)</option>
                </select>
            </div>
            <button type="submit" class="btn-salvar" id="div_botao" onclick="cadastrarUsuario()">Salvar alterações</button>
        </div>
    </div>
    </div>
    </div>
    </div>

    <script>
        function cadastrarUsuario() {


            let nome = ipt_nome.value;

            let nomeEstufa = select_estufa.value;

            let cargo = select_cargo.value;

            let fkEmpresa = sessionStorage.getItem("fkEmpresa"); // getItem pra pegar o valor que o setItem do login guardou

            let fkSuperior = sessionStorage.getItem("idUsuario"); // pega o valor do id no login com getItem

            let mensagem = ""

            console.log("Chamei a função")

            if (nome == "" || cargo == "" || nomeEstufa == "") {

                mensagem = "Preencha os campos corretamente";

            } else {

                cargo = Number(cargo)
                mensagem = "Cadastro realizado com sucesso!"

                let dados = {
                    nome: nome,
                    cargo: cargo,
                    nomeEstufa: nomeEstufa,
                    fkEmpresa: fkEmpresa,
                    fkSuperior: fkSuperior
                }

                fetch('http://localhost:3333/usuarios/cadastrarUsuario', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                })
                    .then(res => {

                        if (res.ok)
                            return res.json()
                    }).then(resultado => {
                        console.log(resultado)
                        div_botao.innerHTML = mensagem;
                    })
                    .catch(error => console.error('Erro:', error));
            }
        }

        function carregarEstufas() {
            let nome = ipt_nome.value;
            let fkEstufa = select_estufa.value;
            let fkEmpresa = sessionStorage.getItem("fkEmpresa");
            let cargo = select_cargo.value;
            let fkSuperior = sessionStorage.getItem("idUsuario"); // pega o valor do id no login com getItem

            let dados = {
                nome: nome,
                cargo: cargo,
                fkEmpresa: fkEmpresa,
                fkSuperior: fkSuperior,
                fkEstufa: fkEstufa
            }
            fetch(`http://localhost:3333/usuarios/listar/${fkEmpresa}`)
                .then(res => res.json())
                .then(estufas => {

                    console.log(estufas);
                    let select = document.getElementById("select_estufa");

                    for (let i = 0; i < estufas.length; i++) {

                        select.innerHTML += `
                    <option value="${estufas[i].nomeEstufa}">
                        ${estufas[i].nomeEstufa}
                    </option>
                `;

                    }

                })
                .catch(err => console.log(err));

            console.log("fkEmpresa:", sessionStorage.getItem("fkEmpresa"));
            console.log("idUsuario:", sessionStorage.getItem("idUsuario"));
            
        }



    </script>

</body>

</html>
