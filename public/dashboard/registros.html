<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registros - Estufas</title>
    <link rel="stylesheet" href="../styles/dashboard/dashboard.css">
    <link rel="stylesheet" href="../styles/dashboard/registro.css">
    <link rel="icon" href="../assets/logo/logosite.png">
</head>

<body>
    <div class="menu">
        <img class="logo" src="../assets/logo/logo-branca.png" alt="Greenlight">
        <div class="item">
            <img class="icons" src="../assets/img/icons/dashboard-icon.png" alt="">
            <a href="dashboard.html">Dashboard</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/perfil-icon.png" alt="">
            <a href="perfil.html">Perfil</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/icon-registro.png" alt="">
            <a href="registros.html" class="ativo">Registros</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/multiple-users-silhouette.png" alt="">
            <a href="usuarios.html">Usuários</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/ajuda-icon.png" alt="">
            <a href="ajuda.html">Ajuda</a>
        </div>
        <div class="item logout-container">
            <a href="../home.html" class="logout">Sair</a>
        </div>
    </div>

    <div class="conteudo">
        <div class="topo"><span>ADMINISTRADOR</span></div>

        <h1>Registros de Luminosidade</h1>
        <p class="usuarios-subtitulo">Histórico detalhado de capturas dos sensores.</p>

        <div class="box">

            <div class="filtros-container">
                <input type="text" id="campoBusca" placeholder="Buscar estufa ou sensor..." oninput="filtrar()"
                    style="flex: 2; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">

                <select id="filtroMes" onchange="filtrar()" class="filtro-select">
                    <option value="">Todos os meses</option>
                    <option value="/01/">Janeiro</option>
                    <option value="/02/">Fevereiro</option>
                    <option value="/03/">Março</option>
                    <option value="/04/">Abril</option>
                    <option value="/05/">Maio</option>
                    <option value="/06/">Junho</option>
                    <option value="/07/">Julho</option>
                    <option value="/08/">Agosto</option>
                    <option value="/09/">Setembro</option>
                    <option value="/10/">Outubro</option>
                    <option value="/11/">Novembro</option>
                    <option value="/12/">Dezembro</option>
                </select>

                <select id="filtroCorredor" onchange="filtrar()" class="filtro-select">
                    <option value="">Corredores (Todos)</option>
                    <option value="A">Corredor A</option>
                    <option value="B">Corredor B</option>
                    <option value="C">Corredor C</option>
                </select>

                <select id="filtroGravidade" onchange="filtrar()" class="filtro-select">
                    <option value="">Gravidades (Todas)</option>
                    <option value="muito-alta">Muito Alta</option>
                    <option value="alta">Alta</option>
                    <option value="ideal">Ideal</option>
                    <option value="baixa">Baixa</option>
                </select>
            </div>

            <div class="tabela-container">
                <table>
                    <thead>
                        <tr>
                            <th>Data / Hora</th>
                            <th>Valor (Lux)</th>
                            <th>Status</th>
                            <th>Estufa</th>
                            <th>Sensor</th>
                            <th>Corredor</th>
                            <th>Bloco</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
<script>
    let listaRegistros = [];
    const idEmpresaLogada = sessionStorage.ID_EMPRESA || 1;

    function obterDadosBanco() {
        fetch(`/registros/buscarRegistros/${idEmpresaLogada}`)
            .then(function (resposta) {
                if (resposta.status == 204) {
                    document.getElementById("tabelaCorpo").innerHTML = "<tr><td colspan='7' style='text-align:center;'>Nenhum registro encontrado no banco de dados.</td></tr>";
                    return;
                }
                if (resposta.ok) {
                    resposta.json().then(function (dadosDoBanco) {
                        listaRegistros = dadosDoBanco;
                        filtrar();
                    });
                } else {
                    console.error("Erro na resposta da API.");
                }
            })
            .catch(function (erro) {
                console.log("Erro ao efetuar o Fetch dos registros: ", erro);
            });
    }

    function calcularStatus(luminosidade) {
        if (luminosidade >= 173) return "muito-alta";
        if (luminosidade >= 168) return "alta";
        if (luminosidade >= 164) return "ideal";
        return "baixa";
    }

    function filtrar() {
        if (typeof event !== 'undefined' && event) {
            event.preventDefault();
        }

        let busca = document.getElementById("campoBusca").value.toLowerCase();
        let gravidade = document.getElementById("filtroGravidade").value;
        let mes = document.getElementById("filtroMes").value;
        let corredor = document.getElementById("filtroCorredor").value;

        let html = "";

        for (let i = 0; i < listaRegistros.length; i++) {
            let registro = listaRegistros[i];
            let statusCalculado = calcularStatus(registro.luminosidade);

            // Converte para brasill 
            let dataFormatada = new Date(registro.dataLeitura).toLocaleString('pt-BR');

            let passouBusca = busca == "" || registro.nomeEstufa.toLowerCase().includes(busca) || registro.codigoSensor.toLowerCase().includes(busca);
            let passouGravidade = gravidade == "" || statusCalculado == gravidade;
            let passouMes = mes == "" || dataFormatada.includes(mes);
            let passouCorredor = corredor == "" || registro.corredor == corredor;

            if (passouBusca && passouGravidade && passouMes && passouCorredor) {
                html += `
                    <tr>
                        <td>${dataFormatada}</td>
                        <td>${registro.luminosidade} Lux</td>
                        <td><span class="status ${statusCalculado}">${statusCalculado.toUpperCase()}</span></td>
                        <td>${registro.nomeEstufa}</td>
                        <td>${registro.codigoSensor}</td>
                        <td>${registro.corredor}</td>
                        <td>${registro.bloco}</td>
                    </tr>`;
            }
        }

        document.getElementById("tabelaCorpo").innerHTML = html || "<tr><td colspan='7' style='text-align:center;'>Nenhum resultado corresponde aos filtros aplicados.</td></tr>";
    }

    window.onload = obterDadosBanco;
</script>
