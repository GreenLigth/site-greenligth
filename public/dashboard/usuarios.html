<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Usuários</title>
    <link rel="stylesheet" href="../styles/dashboard/dashboard.css">
    <link rel="stylesheet" href="../styles/dashboard/usuario.css">
    <link rel="icon" href="../assets/logo/logosite.png">
</head>

<body>
    <div class="menu">
        <img class="logo" src="../assets/logo/logo-branca.png" alt="Greenlight">
        <div class="item">
            <img class="icons" src="../assets/img/icons/dashboard-icon.png" alt="">
            <a href="dashboard.html">Dashboard</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/perfil-icon.png" alt="">
            <a href="perfil.html">Perfil</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/icon-registro.png" alt="">
            <a href="registros.html">Registros</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/multiple-users-silhouette.png" alt="">
            <a href="usuarios.html" class="ativo">Usuários</a>
        </div>
        <div class="item">
            <img class="icons" src="../assets/img/icons/ajuda-icon.png" alt="">
            <a href="ajuda.html">Ajuda</a>
        </div>

        <div class="item logout-container">
            <a href="../index.html" class="logout">Sair</a>
        </div>
    </div>

    <div class="conteudo">
        <div class="topo"><span>ADMINISTRADOR</span></div>

        <h1>USUÁRIO</h1>

        <div class="usuarios-header">
            <p class="usuarios-subtitulo">Gerencie os usuários vinculados às estufas.</p>
            <a href="cadastroUsuario.html">
                <button class="btn-novo-usuario">+ Novo usuário</button>
            </a>
        </div>

        <div class="usuarios-cards">
            <div class="stat-card total">
                <span class="stat-label">Total de usuários</span>
                <span class="stat-valor" id="cardTotal">0</span>
            </div>
            <div class="stat-card ativos">
                <span class="stat-label">Ativos</span>
                <span class="stat-valor" id="cardAtivos">0</span>
            </div>
            <div class="stat-card inativos">
                <span class="stat-label">Inativos</span>
                <span class="stat-valor" id="cardInativos">0</span>
            </div>
        </div>

        <div class="linha">
            <div class="box">
                <div class="usuarios-filtros">
                    <input type="text" id="campoBusca" placeholder="Buscar por nome..." oninput="filtrar()">

                    <select class="filtro-select" id="filtroPerfil" onchange="filtrar()">
                        <option value="">Todos os perfis</option>
                        <option>Adm</option>
                        <option>Gerente</option>
                        <option>Operador</option>
                    </select>

                    <select class="filtro-select" id="filtroStatus" onchange="filtrar()">
                        <option value="">Status do perfil</option>
                        <option>Ativo</option>
                        <option>Inativo</option>
                    </select>

                    <select class="filtro-select" id="filtroEstufa" onchange="filtrar()">
                        <option value="">Todas as estufas</option>
                        <option>A1</option>
                        <option>A2</option>
                    </select>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Nível de acesso</th>
                            <th>Status</th>
                            <th>Estufa vinculada</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    let listaUsuarios = [];

    const idEmpresaLogada = sessionStorage.getItem("fkEmpresa") || 1;

    function obterDadosBanco() {

        fetch(`/usuariosAdm/buscarUsuarios/${idEmpresaLogada}`)
            .then(function (resposta) {
                if (resposta.status == 204) {
                    document.getElementById("tabelaBody").innerHTML = "<tr><td colspan='4' style='text-align:center;'>Nenhum usuário cadastrado.</td></tr>";
                    return;
                }
                if (resposta.ok) {
                    resposta.json().then(function (dadosDoBanco) {
                        listaUsuarios = dadosDoBanco;
                        filtrar();
                    });
                } else {
                    console.error("Erro na resposta da API.");
                }
            })
            .catch(function (erro) {
                console.log("Erro ao efetuar o Fetch dos usuários: ", erro);
            });
    }

    function filtrar() {
        let busca = campoBusca.value.toLowerCase();
        let filtroPerfil = document.getElementById("filtroPerfil").value;
        let filtroSt = filtroStatus.value;
        let filtroEst = filtroEstufa.value;

        let html = "";
        let total = 0;
        let ativos = 0;
        let inativos = 0;

        // Varre a lista de usuários vinda do banco 
        let i = 0;
        while (i < listaUsuarios.length) {
            let usuario = listaUsuarios[i];

            let passouBusca = busca == "" || usuario.nome.toLowerCase().includes(busca);
            let passouPerfil = filtroPerfil == "" || usuario.nivelAcesso == filtroPerfil;
            let passouStatus = filtroSt == "" || usuario.statusPerfil == filtroSt;
            let passouEstufa = filtroEst == "" || usuario.nomeEstufa == filtroEst;

            if (passouBusca && passouPerfil && passouStatus && passouEstufa) {

                // Define a cor conforme o status vindo do banco ('Ativo' ou 'Inativo')
                let classeStatus = (usuario.statusPerfil == "Ativo") ? "ideal" : "muito-alta";

                // Monta a linha dinamicamente com as colunas do banco
                html += `<tr>
                    <td>${usuario.nome}</td>
                    <td>${usuario.nivelAcesso}</td>
                    <td><span class="status ${classeStatus}">${usuario.statusPerfil}</span></td>
                    <td>${usuario.nomeEstufa}</td>
                    <td>
                <button class="btn-status" onclick="alterarStatus(${usuario.idUsuario}, '${usuario.statusPerfil}')">
                    ${usuario.statusPerfil == "Ativo" ? "Desativar" : "Ativar"}
                </button>
                    </td>
                </tr>`;

                // Contador dos KPIs baseado 
                total++;
                if (usuario.statusPerfil == "Ativo") ativos++;
                if (usuario.statusPerfil == "Inativo") inativos++;
            }
            i++;
        }

        // Atualiza os elementos da tela
        tabelaBody.innerHTML = html || "<tr><td colspan='4' style='text-align:center;'>Nenhum resultado corresponde aos filtros.</td></tr>";
        cardTotal.innerHTML = total;
        cardAtivos.innerHTML = ativos;
        cardInativos.innerHTML = inativos;
    }

    function alterarStatus(idUsuario, statusAtual) {

    let novoStatus;

    if(statusAtual == "Ativo"){
        novoStatus = 0;
    } else {
        novoStatus = 1;
    }

    fetch(`/usuariosAdm/alterarStatus/${idUsuario}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            statusPerfil: novoStatus
        })
    })
    .then(resposta => {
        if(resposta.ok){
            obterDadosBanco();
        } else {
            console.log("Erro ao alterar status");
        }
    })
    .catch(erro => {
        console.log(erro);
    });

    }

    // Quando a página carregar puxa do banco automaticamente
    window.onload = obterDadosBanco;
</script>
