<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Cadastrar Usuario</title>
    <link rel="stylesheet" href="styles/cadastroUsuario.css">
    <link rel="stylesheet" href="styles/dashboard.css">

    <link rel="icon" href="./assets/logo/logosite.png">
</head>

<body>
    <div class="menu">
        <img class="logo" src="assets/logo/logo-branca.png" alt="">

        <div class="item">
            <img class="icons" src="assets/img/icons/dashboard-icon.png" alt="">
            <a href="dashboard.html">Dashboard</a>
        </div>

        <div class="item">
            <img class="icons" src="assets/img/icons/perfil-icon.png" alt="">
            <a href="perfil.html">Perfil</a>
        </div>
        <div class="item">
            <img class="icons" src="assets/img/icons/ajuda-icon.png" alt="">
            <a href="usuarios.html" class="ativo">Usuários</a>
        </div>

        <div class="item">
            <img class="icons" src="assets/img/icons/ajuda-icon.png" alt="">
            <a href="ajuda.html">Ajuda</a>
        </div>

        <div class="item logout-container">
            <a href="home.html" class="logout">Sair</a>
        </div>
    </div>

    <div class="conteudo">
        <div class="topo">
            <span>ADMINISTRADOR</span>
        </div>
        <h1>CADASTRAR <br>USUÁRIO</h1>

        <div class="container-perfil">

            
                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" id="ipt_nome" placeholder="Nome">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="ipt_email" placeholder="nome@email.com">
                </div>

                <div class="campo">
                    <label>Nome da Estufa</label>
                    <input type="text" id="ipt_estufa" placeholder="Ex: Estufa Principal">
                </div>

                <div class="campo">
                    <label>Cargo</label>
                    <input type="text" id="ipt_cargo" placeholder="Informe o cargo do funcionario">
                </div>

                <div class="campo-senha-container">
                    <div class="campo">
                        <label>Senha</label>
                        <div class="campo input">
                            <input type="password" id="ipt_senha" placeholder="Mínimo 8 caracteres" id="ipt_senha">
                        </div>
                        <button onclick="visualizar()" class="visualizar-senha">visualizar</button>
                    </div>
                    <button type="submit" class="btn-salvar">Salvar alterações</button>
        </div>
    </div>
</body>

</html>
<script>
    function visualizar(){

        
        let nome = ipt_nome.value;

        let email = ipt_email.value; 
        
        let senha = ipt_senha.value;
        
        let estufa = ipt_estufa.value;

        let cargo = ipt_cargo.value;

        let .com = email.endsWith(".com");

        let greenlight = email.includes("@greenlight");


        if(nome == "" || email == "" || senha == "" || cargo == "" || estufa == "" ) {

            alert("Por favor, preencha todos os campos!");

        
        } else if (email != com || email != greenlight) {

            alert("Por favor, insira um email empresarial!");
 
        }
        
        }
</script>
